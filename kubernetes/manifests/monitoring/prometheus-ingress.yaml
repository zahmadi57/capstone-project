apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus-ingress
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
spec:
  rules:
  # Host-based routing: NGINX matches the DNS hostname and forwards to Prometheus.
  # DNS record: prometheus.project.local -> 192.168.0.59 (prdx-kube101)
  - host: prometheus.finalproject.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kube-prometheus-stack-prometheus
            port:
              number: 9090
