apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lab-app-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  # Host-based routing: NGINX matches the DNS hostname and forwards to the correct service.
  # DNS record: app.project.local -> 192.168.0.59 (prdx-kube101)
  - host: app.project.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: lab-app-service
            port:
              number: 80
